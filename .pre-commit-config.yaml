# Pre-commit hooks for kimi-tachi
# Install: pre-commit install

repos:
  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        exclude: \.md$
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key
      - id: mixed-line-ending

  # Format and lint via project Makefile (uses pyproject.toml versions)
  - repo: local
    hooks:
      - id: make-format
        name: make format
        entry: make format
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: make-check
        name: make check
        entry: make check
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: version-check
        name: Check version consistency
        entry: uv run python scripts/check_version.py
        language: system
        pass_filenames: false
        always_run: true
        stages: [commit]

      - id: changelog-check
        name: Check CHANGELOG
        entry: uv run python scripts/check_changelog.py
        language: system
        pass_filenames: false
        always_run: true
        stages: [commit]
