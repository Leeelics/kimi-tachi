# Kimi-Tachi Teams Configuration
# Version: 1
#
# This file defines all available teams for kimi-tachi.
# Each team has its own coordinator and set of agents.

version: 1

# Default team to use when no team is specified
default_team: "coding"

# Team Definitions
teams:
  coding:
    name: "七人衆"
    description: "编程开发团队 - 代码、架构、审查"
    coordinator: "kamaji"
    theme: "ghibli"
    icon: "◕‿◕"
    agent_count: 7
    agents_dir: "coding"
    memory_namespace: "coding"
    
    # Workflow patterns for this team
    workflow_patterns:
      feature: "tasogare → nekobasu → shishigami → calcifer → enma"
      bugfix: "nekobasu → shishigami → calcifer → enma"
      explore: "nekobasu → phoenix"
      refactor: "phoenix → shishigami → calcifer → enma"
      quick: "calcifer"
      
    # Agent mapping for orchestrator
    agents:
      kamaji:
        name: "釜爺"
        icon: "◕‿◕"
        role: "coordinator"
        description: "Boiler Room Chief - Task coordinator"
      nekobasu:
        name: "猫バス"
        icon: "🚌"
        role: "explorer"
        description: "Cat Bus - Fast code exploration"
      calcifer:
        name: "カルシファー"
        icon: "🔥"
        role: "builder"
        description: "Fire Demon - Implementation & building"
      enma:
        name: "閻魔大王"
        icon: "👹"
        role: "reviewer"
        description: "King of Afterlife - Code review & quality"
      tasogare:
        name: "黄昏時"
        icon: "🌆"
        role: "planner"
        description: "Twilight Hour - Planning & research"
      shishigami:
        name: "シシ神"
        icon: "🦌"
        role: "architect"
        description: "Forest Deity - Architecture & wisdom"
      phoenix:
        name: "火の鳥"
        icon: "🐦"
        role: "librarian"
        description: "Eternal Observer - Documentation & knowledge"

  content:
    name: "三国·自媒体天团"
    description: "内容创作团队 - 选题、写作、排版"
    coordinator: "xunyu"
    theme: "three-kingdoms"
    icon: "🎭"
    agent_count: 5
    agents_dir: "content"
    memory_namespace: "content"
    
    # Workflow patterns for this team
    workflow_patterns:
      article: "guojia → chenlin → zhugeliang → zhugejin"
      hot_topic: "guojia → chenlin → zhugejin"
      series: "guojia → xunyu → chenlin → zhugeliang → zhugejin"
      deep_dive: "guojia → xunyu → chenlin → zhugeliang → zhugejin"
      quick: "chenlin"
      
    # Agent mapping for orchestrator
    agents:
      xunyu:
        name: "文若"
        icon: "📜"
        role: "coordinator"
        description: "Chief Editor - Steady leadership, risk-averse"
      guojia:
        name: "奉孝"
        icon: "🎯"
        role: "topic_hunter"
        description: "Topic Hunter - Insightful trend prediction"
      chenlin:
        name: "孔璋"
        icon: "✍️"
        role: "writer"
        description: "Writer - Powerful prose, Jian'an style"
      zhugeliang:
        name: "孔明"
        icon: "🔍"
        role: "proofreader"
        description: "Proofreader - Meticulous fact-checking"
      zhugejin:
        name: "子瑜"
        icon: "🎨"
        role: "designer"
        description: "Designer - Warm, harmonious aesthetics"

# Team-specific settings
settings:
  # Whether to allow cross-team collaboration (future feature)
  enable_cross_team: false
  
  # Session isolation settings
  session:
    isolate_by_team: true
    prefix_format: "{team_id}.{session_id}"
