  zhugeliang:
    path: ./zhugeliang.yaml
    description: "🔍 Proofreader - Meticulous fact-checking"
  zhugejin:
    path: ./zhugejin.yaml
    description: "🎨 Designer - Warm, harmonious aesthetics"
