name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      
      - name: Install dependencies
        run: |
          uv venv
          uv pip install ruff
      
      - name: Run ruff check
        run: uv run ruff check src/ tests/
      
      - name: Run ruff format check
        run: uv run ruff format --check src/ tests/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12', '3.13']
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      
      - name: Install package
        run: |
          uv venv
          uv pip install -e ".[dev]"
      
      - name: Check import
        run: uv run python -c "import kimi_tachi; print(f'kimi-tachi {kimi_tachi.__version__}')"
      
      - name: Run tests
        run: uv run pytest tests/ -v --tb=short
      
      - name: Build package
        run: uv build

  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Check version consistency
        run: |
          python3 << 'EOF'
          import re
          import sys
          
          # Read pyproject.toml
          with open("pyproject.toml") as f:
              pyproject = f.read()
          pyproject_version = re.search(r'version = "([^"]+)"', pyproject)
          if not pyproject_version:
              print("❌ Could not find version in pyproject.toml")
              sys.exit(1)
          pyproject_version = pyproject_version.group(1)
          
          # Read __init__.py
          with open("src/kimi_tachi/__init__.py") as f:
              init_file = f.read()
          init_version = re.search(r'__version__ = "([^"]+)"', init_file)
          if not init_version:
              print("❌ Could not find __version__ in __init__.py")
              sys.exit(1)
          init_version = init_version.group(1)
          
          # Read plugin.json
          import json
          with open("plugins/kimi-tachi/plugin.json") as f:
              plugin = json.load(f)
          plugin_version = plugin.get("version")
          
          print(f"pyproject.toml: {pyproject_version}")
          print(f"__init__.py:    {init_version}")
          print(f"plugin.json:    {plugin_version}")
          
          if pyproject_version != init_version or pyproject_version != plugin_version:
              print("❌ Version mismatch!")
              sys.exit(1)
          
          print("✅ All versions match!")
          EOF
