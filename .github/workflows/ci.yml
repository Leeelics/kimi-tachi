name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - ".github/workflows/**"
      - "src/**"
      - "tests/**"
      - "agents/**"
      - "skills/**"
      - "scripts/**"
      - "pyproject.toml"
      - "uv.lock"
      - "Makefile"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - "src/**"
      - "tests/**"
      - "agents/**"
      - "skills/**"
      - "scripts/**"
      - "pyproject.toml"
      - "uv.lock"
      - "Makefile"

env:
  NO_COLOR: "1"
  TERM: dumb

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: uv.lock
      
      - name: Install dependencies
        run: |
          uv venv
          uv pip install ruff
      
      - name: Run ruff check
        run: make check

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12', '3.13']
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: uv.lock
      
      - name: Prepare environment
        run: make prepare
      
      - name: Run tests
        run: make test

  version-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Check version consistency
        run: python3 scripts/check_version.py
      
      - name: Check CHANGELOG
        run: make changelog-check

  build:
    runs-on: ubuntu-latest
    needs: [lint, test, version-check]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: uv.lock
      
      - name: Build package
        run: make build
      
      - name: Test build
        run: make build-check
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
