name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.4.1)'
        required: true
        type: string

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      
      - name: Install dependencies
        run: |
          uv venv
          uv pip install ruff
      
      - name: Run ruff check
        run: uv run ruff check src/ tests/
      
      - name: Run ruff format check
        run: uv run ruff format --check src/ tests/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12', '3.13']
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      
      - name: Install package
        run: |
          uv venv
          uv pip install -e ".[dev]"
      
      - name: Run tests
        run: uv run pytest tests/ -v --tb=short

  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Check version consistency
        run: |
          python3 << 'EOF'
          import re
          import sys
          import os
          
          # Read pyproject.toml
          with open("pyproject.toml") as f:
              pyproject = f.read()
          pyproject_version = re.search(r'version = "([^"]+)"', pyproject)
          if not pyproject_version:
              print("❌ Could not find version in pyproject.toml")
              sys.exit(1)
          pyproject_version = pyproject_version.group(1)
          
          # Read __init__.py
          with open("src/kimi_tachi/__init__.py") as f:
              init_file = f.read()
          init_version = re.search(r'__version__ = "([^"]+)"', init_file)
          if not init_version:
              print("❌ Could not find __version__ in __init__.py")
              sys.exit(1)
          init_version = init_version.group(1)
          
          # Read plugin.json
          import json
          with open("plugins/kimi-tachi/plugin.json") as f:
              plugin = json.load(f)
          plugin_version = plugin.get("version")
          
          # Get tag version (if triggered by tag push)
          tag_version = None
          github_ref = os.environ.get('GITHUB_REF', '')
          if github_ref.startswith('refs/tags/v'):
              tag_version = github_ref.replace('refs/tags/v', '')
          
          print(f"pyproject.toml: {pyproject_version}")
          print(f"__init__.py:    {init_version}")
          print(f"plugin.json:    {plugin_version}")
          if tag_version:
              print(f"git tag:        {tag_version}")
          
          # Check all match
          versions = [pyproject_version, init_version, plugin_version]
          if tag_version:
              versions.append(tag_version)
          
          if len(set(versions)) != 1:
              print("❌ Version mismatch!")
              sys.exit(1)
          
          print("✅ All versions match!")
          
          # Check CHANGELOG has entry for this version
          with open("CHANGELOG.md") as f:
              changelog = f.read()
          if f"## [{pyproject_version}]" not in changelog:
              print(f"❌ No CHANGELOG entry for version {pyproject_version}")
              sys.exit(1)
          print(f"✅ CHANGELOG has entry for {pyproject_version}")
          EOF

  build:
    needs: [lint, test, version-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      
      - name: Build package
        run: uv build
      
      - name: Check package
        run: |
          uv venv
          uv pip install dist/*.whl
          uv run python -c "import kimi_tachi; print(f'✅ Package installs: {kimi_tachi.__version__}')"
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/kimi-tachi
    permissions:
      id-token: write  # Required for trusted publishing
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      
      - name: Publish to PyPI
        run: uv publish dist/*

  create-release:
    needs: [build, publish-pypi]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      
      - name: Extract version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.get_version.outputs.VERSION, 'alpha') || contains(steps.get_version.outputs.VERSION, 'beta') || contains(steps.get_version.outputs.VERSION, 'rc') }}
          name: Release ${{ steps.get_version.outputs.VERSION }}
